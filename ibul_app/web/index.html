<!DOCTYPE html>
<html>
<head>

    If you are serving your web app in a path other than the root, change the

    The path provided below has to start and end with a slash "/" in order for

  <meta charset="UTF-8">

  <meta property="og:locale" content="tr_TR">
  <meta property="og:title" content="İbul | Online Alışveriş ve Hızlı Teslimat">
  <meta property="og:description" content="İbul ile teknoloji, market ve daha birçok kategoride online alışveriş yapın; hızlı teslimat avantajını yakalayın.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="İbul | Online Alışveriş ve Hızlı Teslimat">
  <meta name="twitter:description" content="İbul ile teknoloji, market ve daha birçok kategoride online alışveriş yapın; hızlı teslimat avantajını yakalayın.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="İbul">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icons/ibul_logo_2.png"/>
  
  <!-- Image Cropper Dependencies — loaded deferred, only used in seller/admin flows -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.css" integrity="sha512-bs9fAcj1st972S+0d0UL3g6a+gXzIV5Tmd3f+mXv39hOtyS+1kU/tG1+mJt6O+GkXzR2tO7sH+M+N/sT+m/k7A==" crossorigin="anonymous" referrerpolicy="no-referrer" media="print" onload="this.media='all'" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js" integrity="sha512-9KkIqDfN7q8Yk9X3v9J+F+XzP+k7O/sT+m/k7A==" crossorigin="anonymous" referrerpolicy="no-referrer" defer></script>

  <title>İbul | Online Alışveriş ve Hızlı Teslimat</title>
  <link rel="manifest" href="manifest.json">

  <!-- QR / app preloader — shown immediately while the Flutter engine loads.
       Dismissed automatically when the Flutter canvas (flt-glass-pane) appears.
       Keeps the user informed and prevents the blank-white-screen experience. -->
  <style>
    #ibul-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #ibul-loader.fade-out { opacity: 0; pointer-events: none; }
    #ibul-loader-logo {
      width: 72px; height: 72px; border-radius: 20px;
      background: linear-gradient(135deg, #7B2FBE 0%, #5B1FBF 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(123,47,190,0.30);
      margin-bottom: 24px;
    }
    #ibul-loader-logo svg { width: 40px; height: 40px; fill: #fff; }
    #ibul-loader-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(123,47,190,0.18);
      border-top-color: #7B2FBE;
      border-radius: 50%;
      animation: ibul-spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes ibul-spin { to { transform: rotate(360deg); } }
    #ibul-loader-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; color: #888; letter-spacing: 0.2px;
    }
  </style>
  <div id="ibul-loader">
    <div id="ibul-loader-logo">
      <!-- Store icon fallback while brand assets load -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 4H4v2l8 5 8-5V4zm0 4.236-8 5-8-5V20h16V8.236z"/>
      </svg>
    </div>
    <div id="ibul-loader-spinner"></div>
    <div id="ibul-loader-text">Yükleniyor…</div>
  </div>
  <script>
    (function () {
      // Dismiss the preloader once Flutter inserts its canvas into the DOM.
      var observer = new MutationObserver(function () {
        if (document.querySelector('flt-glass-pane')) {
          observer.disconnect();
          var el = document.getElementById('ibul-loader');
          if (el) {
            el.classList.add('fade-out');
            setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 350);
          }
        }
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });
      // Safety net: remove after 15 s in case Flutter never starts
      setTimeout(function () {
        observer.disconnect();
        var el = document.getElementById('ibul-loader');
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }, 15000);
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
